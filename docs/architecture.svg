<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="920" height="520" fill="#ffffff"/>

  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Phishing URL Classifier Architecture</text>

  <!-- Training path -->
  <rect x="40" y="60" width="180" height="70" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="130" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">data/urls.csv</text>
  <text x="130" y="108" text-anchor="middle" font-size="11" fill="#475569">url, label</text>

  <rect x="280" y="60" width="200" height="70" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="380" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">app/features.py</text>
  <text x="380" y="108" text-anchor="middle" font-size="11" fill="#475569">extract_features() - 23 features</text>

  <rect x="540" y="60" width="180" height="70" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="630" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">app/train.py</text>
  <text x="630" y="108" text-anchor="middle" font-size="11" fill="#475569">XGBoost + CV + tuning</text>

  <rect x="760" y="60" width="140" height="70" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="830" y="88" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">joblib artifact</text>
  <text x="830" y="108" text-anchor="middle" font-size="11" fill="#475569">model + transformer</text>

  <line x1="220" y1="95" x2="280" y2="95" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="480" y1="95" x2="540" y2="95" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="720" y1="95" x2="760" y2="95" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- MLflow -->
  <rect x="540" y="170" width="180" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="630" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">MLflow</text>
  <text x="630" y="216" text-anchor="middle" font-size="11" fill="#475569">./mlruns (local)</text>
  <line x1="630" y1="130" x2="630" y2="170" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Serving -->
  <rect x="120" y="290" width="220" height="80" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="230" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">FastAPI (app/api.py)</text>
  <text x="230" y="340" text-anchor="middle" font-size="11" fill="#475569">POST /predict | GET /health</text>
  <text x="230" y="358" text-anchor="middle" font-size="11" fill="#475569">Uvicorn - model cached in memory</text>

  <rect x="420" y="290" width="220" height="80" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="530" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">MCP Server (app/mcp_server.py)</text>
  <text x="530" y="340" text-anchor="middle" font-size="11" fill="#475569">tool: score_url(url)</text>
  <text x="530" y="358" text-anchor="middle" font-size="11" fill="#475569">stdio transport</text>

  <rect x="720" y="290" width="160" height="80" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="800" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">app/model.py</text>
  <text x="800" y="340" text-anchor="middle" font-size="11" fill="#475569">load_artifact()</text>
  <text x="800" y="358" text-anchor="middle" font-size="11" fill="#475569">predict()</text>

  <line x1="830" y1="130" x2="800" y2="290" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="340" y1="330" x2="720" y2="330" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="640" y1="330" x2="720" y2="330" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Shared features at serve time -->
  <rect x="280" y="410" width="360" height="70" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="460" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Shared feature path (no train/serve skew)</text>
  <text x="460" y="460" text-anchor="middle" font-size="11" fill="#475569">extract_features(url) - vector - XGBoost predict_proba</text>

  <line x1="230" y1="370" x2="360" y2="410" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="530" y1="370" x2="500" y2="410" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <line x1="800" y1="370" x2="560" y2="410" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- External clients -->
  <rect x="40" y="300" width="60" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="70" y="335" text-anchor="middle" font-size="11" fill="#475569">HTTP</text>
  <text x="70" y="350" text-anchor="middle" font-size="11" fill="#475569">client</text>
  <line x1="100" y1="330" x2="120" y2="330" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <rect x="40" y="400" width="120" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="428" text-anchor="middle" font-size="11" fill="#475569">Claude Desktop</text>
  <text x="100" y="446" text-anchor="middle" font-size="11" fill="#475569">Cursor / Agent</text>
  <line x1="160" y1="430" x2="280" y2="445" stroke="#334155" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
</svg>
