services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=models/phishing_model.joblib
      - DATA_PATH=data/urls.csv
      - MLFLOW_TRACKING_URI=file:./mlruns
      - LOG_LEVEL=INFO
      - MONITORING_ENABLED=false
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  train:
    build: .
    profiles: ["train"]
    command: ["python", "-m", "app.train"]
    environment:
      - DATA_PATH=data/urls.csv
      - MODEL_PATH=models/phishing_model.joblib
      - MLFLOW_TRACKING_URI=file:./mlruns
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns

  mcp:
    build: .
    profiles: ["mcp"]
    stdin_open: true
    tty: true
    command: ["python", "-m", "app.mcp_server"]
    environment:
      - MODEL_PATH=models/phishing_model.joblib
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models:ro
